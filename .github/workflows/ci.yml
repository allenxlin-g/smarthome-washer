name: CI

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at 00:00

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install dependencies
      run: npm install
      working-directory: washer-start/functions

    - name: Run lint
      run: npm run lint
      working-directory: washer-start/functions
